<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrSmall" viewBox="0 0 10 10" markerWidth="22" markerHeight="22" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#112717"/>
    </marker>
    <marker id="arrMedium" viewBox="0 0 10 10" markerWidth="28" markerHeight="28" refX="8" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#112717"/>
    </marker>
    <!-- Larger arrowhead for the defining return arrow -->
    <marker id="arrReturn" viewBox="0 0 10 10" markerWidth="44" markerHeight="44" refX="7" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#112717"/>
    </marker>
  </defs>

  <!-- Background bands (sky + soil; no fossil oil band) -->
  <rect x="0" y="0" width="1200" height="585" fill="#DCE7E6"/>
  <rect x="0" y="585" width="1200" height="315" fill="#8A6F4F"/>

  <!-- Soil label -->
  <text x="600" y="760" text-anchor="middle" font-size="28" font-weight="700" fill="#FFF7E4">Soil</text>

  <!-- CO2 cloud (upper right) -->
  <g>
    <path d="M 905 135 Q 885 135 885 115 Q 885 93 915 90 Q 920 65 950 70 Q 965 50 995 63 Q 1025 55 1030 83 Q 1055 85 1050 110 Q 1055 140 1025 140 Z"
          fill="#FFF7E4" stroke="#112717" stroke-width="3" stroke-linejoin="round"/>
    <text x="965" y="123" text-anchor="middle" font-size="32" font-weight="700" fill="#112717">CO<tspan font-size="22" dy="8">2</tspan></text>
  </g>

  <!-- Upward arrow: products to cloud -->
  <line x1="960" y1="480" x2="960" y2="175" stroke="#112717" stroke-width="10" marker-end="url(#arrMedium)"/>

  <!-- Large curved return arrow: cloud back to plants (the defining feature) -->
  <path d="M 895 150 Q 555 20 220 400"
        fill="none" stroke="#112717" stroke-width="14" stroke-linecap="round"
        marker-end="url(#arrReturn)"/>

  <!-- Plants (leftmost - mirror pumpjack position) -->
  <g>
    <text x="330" y="395" text-anchor="start" font-size="24" fill="#112717">Plants</text>

    <!-- Plant 1 (left) -->
    <g>
      <!-- soil mound -->
      <ellipse cx="195" cy="583" rx="30" ry="9" fill="#6B4A2F" stroke="#112717" stroke-width="3"/>
      <!-- stem -->
      <line x1="195" y1="575" x2="195" y2="472" stroke="#112717" stroke-width="3"/>
      <!-- leaves -->
      <path d="M 195 552 Q 162 544 160 522 Q 184 530 195 548" fill="#24B101" stroke="#112717" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M 195 528 Q 230 518 228 498 Q 206 506 195 524" fill="#24B101" stroke="#112717" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M 195 502 Q 170 494 170 474 Q 190 480 195 498" fill="#24B101" stroke="#112717" stroke-width="2.5" stroke-linejoin="round"/>
    </g>

    <!-- Plant 2 (right) -->
    <g>
      <ellipse cx="285" cy="583" rx="30" ry="9" fill="#6B4A2F" stroke="#112717" stroke-width="3"/>
      <line x1="285" y1="575" x2="285" y2="472" stroke="#112717" stroke-width="3"/>
      <path d="M 285 552 Q 318 544 320 522 Q 296 530 285 548" fill="#24B101" stroke="#112717" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M 285 528 Q 250 518 252 498 Q 274 506 285 524" fill="#24B101" stroke="#112717" stroke-width="2.5" stroke-linejoin="round"/>
      <path d="M 285 502 Q 310 494 310 474 Q 290 480 285 498" fill="#24B101" stroke="#112717" stroke-width="2.5" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Factory (identical to Brief 1) -->
  <g>
    <text x="600" y="395" text-anchor="middle" font-size="24" fill="#112717">Industry</text>
    <rect x="508" y="418" width="26" height="62" fill="#FFF7E4" stroke="#112717" stroke-width="3"/>
    <rect x="548" y="438" width="26" height="42" fill="#FFF7E4" stroke="#112717" stroke-width="3"/>
    <rect x="588" y="428" width="26" height="52" fill="#FFF7E4" stroke="#112717" stroke-width="3"/>
    <rect x="490" y="475" width="220" height="110" fill="#FFF7E4" stroke="#112717" stroke-width="3"/>
    <rect x="628" y="505" width="22" height="22" fill="none" stroke="#112717" stroke-width="2.5"/>
    <rect x="665" y="505" width="22" height="22" fill="none" stroke="#112717" stroke-width="2.5"/>
    <rect x="628" y="540" width="22" height="22" fill="none" stroke="#112717" stroke-width="2.5"/>
  </g>

  <!-- Consumer products cluster (identical to Brief 1) -->
  <g>
    <rect x="870" y="433" width="180" height="30" fill="#DCE7E6"/>
    <text x="960" y="455" text-anchor="middle" font-size="24" fill="#112717">BioSolutions</text>

    <!-- Spray bottle -->
    <g>
      <rect x="870" y="515" width="30" height="70" rx="3" fill="#FFF7E4" stroke="#112717" stroke-width="3"/>
      <rect x="878" y="492" width="14" height="24" fill="#FFF7E4" stroke="#112717" stroke-width="3"/>
      <path d="M 892 500 L 912 497 L 914 510 L 892 513 Z" fill="#FFF7E4" stroke="#112717" stroke-width="3" stroke-linejoin="round"/>
      <circle cx="921" cy="490" r="2" fill="#112717"/>
      <circle cx="926" cy="483" r="2" fill="#112717"/>
      <circle cx="917" cy="482" r="2" fill="#112717"/>
    </g>

    <!-- Smartphone with pointing finger -->
    <g>
      <rect x="928" y="503" width="48" height="82" rx="6" fill="#FFF7E4" stroke="#112717" stroke-width="3"/>
      <rect x="934" y="513" width="36" height="58" fill="none" stroke="#112717" stroke-width="2"/>
      <path d="M 946 533 L 946 548 L 942 548 L 942 563 L 958 563 L 958 548 L 954 548 L 954 536 L 950 536 L 950 533 Z"
            fill="#FFF7E4" stroke="#112717" stroke-width="2" stroke-linejoin="round"/>
    </g>

    <!-- Car -->
    <g>
      <path d="M 998 562 L 1010 545 L 1020 534 L 1045 534 L 1055 545 L 1067 562 L 1067 572 L 998 572 Z"
            fill="#FFF7E4" stroke="#112717" stroke-width="3" stroke-linejoin="round"/>
      <line x1="1033" y1="538" x2="1033" y2="562" stroke="#112717" stroke-width="2.5"/>
      <circle cx="1002" cy="566" r="1.5" fill="#112717"/>
      <circle cx="1013" cy="575" r="9" fill="#FFF7E4" stroke="#112717" stroke-width="3"/>
      <circle cx="1013" cy="575" r="3" fill="#112717"/>
      <circle cx="1052" cy="575" r="9" fill="#FFF7E4" stroke="#112717" stroke-width="3"/>
      <circle cx="1052" cy="575" r="3" fill="#112717"/>
    </g>
  </g>

  <!-- Horizontal ground-level arrows -->
  <line x1="370" y1="540" x2="470" y2="540" stroke="#112717" stroke-width="8" marker-end="url(#arrSmall)"/>
  <line x1="720" y1="540" x2="855" y2="540" stroke="#112717" stroke-width="8" marker-end="url(#arrSmall)"/>
</svg>
